- id: '1780870759718'
  alias: Corredor - movimento
  description: ''
  mode: restart
  triggers:
  - trigger: state
    to: idle
    entity_id: timer.corredor
    id: Movimento_ocioso
    alias: 'Movimento Ocioso'
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.motion_sensor_movimento
    id: Movimento1
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.corredor_suite_luminance_motion_sensor_movimento
    id: Movimento2
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.tz3000_6ygjfyll_ts0202
    id: Movimento3
  conditions:
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: disarmed
  actions:
    - if:
      - condition: trigger
        id:
          - Movimento2
          - Movimento1
          - Movimento3
      then:
        - type: start
          entity_id: timer.corredor
          domain: timer
        - if:
          - condition: state
            entity_id: switch.sonoff_10018dee48_3
            state: 'off'
          - condition: state
            entity_id: alarm_control_panel.alarmo
            state: disarmed
          then:
            - if:
              - condition: time
                before: 23:00:00
              then:
                - type: turn_on
                  entity_id: switch.sonoff_10018dee48_1
                  domain: switch
              else:
                - type: turn_on
                  entity_id: switch.sonoff_100203a579_1
                  domain: switch
    - if:
      - condition: trigger
        id: Movimento_ocioso
      then:
        - type: turn_off
          entity_id:
            - switch.sonoff_10018dee48_1
            - switch.sonoff_100203a579_1
          domain: switch
