- id: '1780883801933'
  alias: Sala - movimento
  description: ''
  mode: restart
  triggers:
  - trigger: state
    to: idle
    entity_id: timer.sala
    id: Movimento_ocioso
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.sala_motion_sensor
    id: Movimento
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.cozinha_motion_sensor_movimento_2
    id: CozinhaMovimento
  - trigger: state
    to: 'off'
    entity_id: binary_sensor.sala_motion_sensor
    id: Liberado
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.corredor_motion_sensor_pro_movimento
    id: 'Movimento Pro'
  - trigger: state
    to: 'off'
    entity_id: binary_sensor.corredor_motion_sensor_pro_movimento
    id: Liberado
  - trigger: state
    to: 'on'
    entity_id: light.luzes_da_sala
    id: 'Luzes ligada'
  conditions:
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: disarmed
  actions:
    - if:
      - condition: trigger
        id:
          - Movimento
          - CozinhaMovimento
          - 'Movimento Pro'
      then:
        - action: timer.start
          target:
            entity_id: timer.sala
          data: {}
        - if:
          - condition: state
            entity_id: switch.sonoff_10018dee48_3
            state: 'on'
          - condition: device
            device_id: 5e51e34745f04cf7f80d7a374d922d6f
            type: is_disarmed
            domain: alarm_control_panel
          - condition: state
            entity_id: switch.luzes_da_sala
            state: 'off'
          - condition: device
            device_id: 9effd46c0c669c81be568b6baf21a14c
            entity_id: eea259ec8e8a95d09dd5c7d8619d1658
            type: is_off
            domain: media_player
          - condition: sun
            before: sunrise
            after: sunset
          then:
            - action: switch.turn_on
              target:
                entity_id: switch.sonoff_10021a5971_2
              data: {}
            - delay:
                hours: 0
                minutes: 3
                seconds: 0
                milliseconds: 0
            - action: switch.turn_off
              target:
                entity_id: switch.sonoff_10021a5971_2
              data: {}
    - action: media_player.volume_set
      target:
        entity_id: media_player.music_frame
      data:
        volume_level: 0.09
    - if:
      - condition: trigger
        id: Movimento_ocioso
      then:
        - action: media_player.volume_set
          target:
            entity_id: media_player.music_frame_2
          data:
            volume_level: 0.11
        - action: switch.turn_off
          target:
            entity_id: switch.sonoff_1002036351_1
          data: {}
        - type: play_media
          device_id: 1024b1c11e9d6da1d9e3082300842673
          media_content_id: 'media-source://tts/tts.google_en_com?message=Aten%C3%A7%C3%A3o%21+As+luzes+da+sala+ser%C3%A3o+desligadas+em+1+minuto%21+Ligue+alguma+luz+ou+se+movimente.&language=pt'
          media_content_type: 'audio/mp3'
          domain: media_player
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - type: play_media
          device_id: 1024b1c11e9d6da1d9e3082300842673
          media_content_id: 'media-source://tts/tts.google_en_com?message=Aten%C3%A7%C3%A3o%21+As+luzes+da+sala+ser%C3%A3o+desligadas+em+1+minuto%21+Ligue+alguma+luz+ou+se+movimente.&language=pt'
          media_content_type: 'audio/mp3'
          domain: media_player
        - action: switch.turn_off
          target:
            entity_id: switch.sonoff_1002036186_2
          data: {}
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - action: media_player.turn_off
          target:
            entity_id: media_player.music_frame_2
          data: {}
        - action: switch.turn_off
          target:
            entity_id: switch.luzes_da_sala
          data: {}
        - action: alexa_devices.send_text_command
          target:
            device_id: 38496a203273bbff294d6465d4042e55
          data:
            text_command: 'desligar tela'
    - if:
      - condition: trigger
        id: Liberado
      then:
        - action: timer.start
          target:
            entity_id: timer.sala
          data: {}
