- id: 'auto'
  alias: Sala - movimento
  description: ''
  mode: restart
  triggers:
  - trigger: state
    to: idle
    entity_id: timer.sala
    id: Movimento_ocioso
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.sala_motion_sensor
    id: Movimento
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.cozinha_motion_sensor_movimento_2
    id: CozinhaMovimento
  - trigger: state
    to: 'off'
    entity_id: binary_sensor.sala_motion_sensor
    id: Liberado
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.corredor_motion_sensor_pro_movimento
    id: 'Movimento Pro'
  - trigger: state
    to: 'off'
    entity_id: binary_sensor.corredor_motion_sensor_pro_movimento
    id: Liberado
  - trigger: state
    to: 'on'
    entity_id: light.luzes_da_sala
    id: 'Luzes ligada'
  conditions:
  - condition: 
    alarm_control_panel: disarmed
  actions:
    - if:
      - condition: trigger
        id: Movimento
        id: CozinhaMovimento
        id: 'Movimento Pro'
      then:
        - type: start
          entity_id: timer.sala
          domain: timer
        - if:
          - condition: state
            entity_id: switch.sonoff_10018dee48_3
            state: 'on'
          - condition: device
            device_id: 5e51e34745f04cf7f80d7a374d922d6f
            type: is_disarmed
            domain: alarm_control_panel
          - condition: state
            entity_id: switch.luzes_da_sala
            state: 'off'
          - condition: device
            device_id: 5e51e34745f04cf7f80d7a374d922d6f
            type: is_disarmed
            domain: media_player
          - condition: sun
            before: sunrise
            after: sunset
          then:
            - type: turn_on
              entity_id: switch.sonoff_10021a5971_2
              domain: switch
            - delay:
              hours: 0
              minutes: 3
              seconds: 0
              milliseconds: 0
            - type: turn_off
              entity_id: switch.sonoff_10021a5971_2
              domain: switch
    - type: volume_set
      entity_id: media_player.music_frame
      volume_level: 0.09
      domain: media_player
    - if:
      - condition: trigger
        id: Movimento_ocioso
      then:
        - type: volume_set
          entity_id: media_player.music_frame_2
          volume_level: 0.11
          switch: turn_off
          entity_id: switch.sonoff_1002036351_1
          media_player: play_media
          device_id: 1024b1c11e9d6da1d9e3082300842673
          domain: media_player
        - delay:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
        - type: play_media
          device_id: 1024b1c11e9d6da1d9e3082300842673
          switch: turn_off
          entity_id: switch.sonoff_1002036186_2
          domain: media_player
        - delay:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
        - type: turn_off
          entity_id: media_player.music_frame_2
          switch: turn_off
          entity_id: switch.luzes_da_sala
          alexa_devices: send_text_command
          device_id: 38496a203273bbff294d6465d4042e55
          text_command: 'desligar tela'
          domain: media_player
    - if:
      - condition: trigger
        id: Liberado
      then:
        - type: start
          entity_id: timer.sala
          domain: timer
