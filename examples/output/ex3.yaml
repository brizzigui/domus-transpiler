    entity_id: d46e6d632a36b57b7c07b1885c32ad88
    type: battery_level
    domain: sensor
    id: '- de 5'
    below: 5
  actions:
    - if:
      - condition: trigger
        id: '+ de 75'
      then:
        - type: turn_off
          device_id: bda1f38607c9e810f10b241569f46c77
          entity_id: 6a55b660d511de43c42b534c2f201dbb
          domain: switch
        - action: notify.mobile_app_zfold4
          data:
            message: 'Tablet descarregando'
      else:
        - if:
          - condition: trigger
            id:
              - '- de 20'
              - '- de 10'
          then:
            - type: turn_on
              device_id: bda1f38607c9e810f10b241569f46c77
              entity_id: 6a55b660d511de43c42b534c2f201dbb
              domain: switch
            - action: notify.mobile_app_zfold4
              data:
                message: 'Tablet carregando'
          else:
            - if:
              - condition: trigger
                id: '- de 5'
              then:
                - type: turn_on
                  device_id: bda1f38607c9e810f10b241569f46c77
                  entity_id: 6a55b660d511de43c42b534c2f201dbb
                  domain: switch
                - action: notify.mobile_app_zfold4
                  data:
                    message: 'Tablet carregando'
                    title: 'Tablet zerado de bateria '
