- id: 'auto'
  alias: Suite - movimento
  description: ''
  mode: restart
  triggers:
  - trigger: state
    to: idle
    entity_id: timer.suite
    id: Ocioso
  - trigger: state
    to: active
    entity_id: timer.suite
    id: Movimento
  - trigger: device
    device_id: 902962bccd850d600c733825ce64149b
    entity_id: 40cb89919c68a62f97d1c5f343e36f30
    binary_sensor: turned_on
    id: 'Movimento cama'
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.sonoff_a440036eb8
    id: Detector
  conditions:
  - condition: 
    alarm_control_panel: disarmed
  actions:
    - if:
      - condition: trigger
        id:
          - Movimento
          - 'Movimento cama'
          - Detector
      then:
        - type: start
          entity_id: timer.suite
          domain: timer
        - if:
          - condition: device
            type: is_off
            domain: switch
            device_id: 17577b83efd0951c4002cd6c7b91053c
          then:
            - type: turn_on
              device_id: 9920034bd1123c1923242b68c92e5d7d
              entity_id: 73f3f45361dd6dd6828b4f132cfcaa4a
              domain: light
    - if:
      - condition: trigger
        id: Ocioso
      then:
        - type: turn_off
          device_id: b2f2ddf08a4b8e321fa259c76df42cef
          entity_id: e6bd5f71286d23ea1c87b580aea4407c
          domain: switch
        - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
        - type: turn_off
          entity_id: light.arandela_suite
          domain: light
        - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
        - type: turn_off
          entity_id: light.arandela_suite
          switch: turn_off
          device_id: 6fd6b17870c0345ad8bf36fb086fca49
          entity_id: 726fc9c450c2044cc6bf5b4d8508436c
          domain: light
        - delay:
          hours: 0
          minutes: 0
          seconds: 30
          milliseconds: 0
        - type: turn_off
          entity_id: switch.luzes_da_suite
          domain: switch
