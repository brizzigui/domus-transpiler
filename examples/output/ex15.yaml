- id: '1780870759715'
  alias: Eric -  movimento
  description: ''
  mode: restart
  triggers:
  - trigger: state
    to: idle
    entity_id: timer.quarto_eric
    id: Movimento_ocioso
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.eric_motion_sensor_movimento
    id: Movimento
  - trigger: state
    to: 'off'
    entity_id: binary_sensor.eric_motion_sensor_movimento
    id: Liberado
  - trigger: state
    to: 'on'
    entity_id: switch.luzes_do_eric
    id: Interruptores
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.eric_motion_sensor_quarto
    id: Movimento2
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.eric_motion_sensor_quarto
    id: Liberado2
  conditions:
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: disarmed
  actions:
    - if:
      - condition: trigger
        id:
          - Movimento
          - Interruptores
          - Movimento2
      then:
        - type: start
          entity_id: timer.quarto_eric
          domain: timer
        - if:
          - condition: state
            entity_id: alarm_control_panel.alarmo
            state: disarmed
          - condition: state
            entity_id: switch.sonoff_10018dee48_3
            state: 'off'
          then:
            - type: turn_on
              entity_id: switch.sonoff_10018de98b_3
              domain: switch
            - type: turn_on
              device_id: 6ca8db2cd6cb58a49ec19e1a2de654a1
              entity_id: 1e5dbdfba8fce27d9c0b427b3c109531
              domain: light
    - if:
      - condition: trigger
        id: Movimento_ocioso
      then:
        - type: turn_off
          entity_id: switch.sonoff_10018de98b_1
          domain: switch
        - delay:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
        - type: turn_off
          entity_id:
            - switch.eric_nichos_interruptor_1
            - switch.sonoff_10018de98b_1
          domain: switch
        - delay:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
        - type: turn_off
          entity_id:
            - switch.luzes_do_eric
            - switch.eric_led_da_tv_tomada_1
            - switch.sonoff_10018de98b_3
            - switch.wifi_breaker_3_interruptor_1
          domain: switch
        - type: turn_off
          device_id: be022c4355e8e71c2331ee1c0a485fd3
          entity_id: 627a27a968c5244807bdbcc477080e21
          domain: light
        - type: turn_off
          device_id: 6ca8db2cd6cb58a49ec19e1a2de654a1
          entity_id: 1e5dbdfba8fce27d9c0b427b3c109531
          domain: light
    - if:
      - condition: trigger
        id:
          - Liberado
          - Liberado2
      then:
        - type: start
          entity_id: timer.quarto_eric
          domain: timer
