- id: 'auto'
  alias: Lavabo - 3o botão interruptor
  description: ''
  mode: restart
  triggers:
  - trigger: device
    device_id: 9a51076c10d0adead01a5e23ba16e4dc
    entity_id: 8aa7f9cf78ad1d62f4df88ca2360df73
    switch: turned_on
    id: Liga
  - trigger: device
    device_id: 9a51076c10d0adead01a5e23ba16e4dc
    entity_id: 8aa7f9cf78ad1d62f4df88ca2360df73
    switch: turned_off
    id: Desliga
  conditions:
  - condition: 
    alarm_control_panel: disarmed
  actions:
    - if:
      - condition: trigger
        id: Liga
      then:
        - type: turn_on
          entity_id:
            - switch.espelho_do_lavabo
            - switch.sonoff_100200129d_2
          domain: switch
      else:
        - if:
          - condition: trigger
            id: Desliga
          then:
            - type: turn_off
              entity_id:
                - switch.sonoff_100200129d_3
                - switch.sonoff_100200129d_2
                - switch.sonoff_100200129d_1
                - switch.espelho_do_lavabo
              domain: switch
    - type: mobile_app_zfold4
      message: Lavabo
      domain: notify
