- id: '1780883801927'
  alias: Nicole - movimento
  description: ''
  mode: restart
  triggers:
  - trigger: state
    to: idle
    entity_id: timer.quarto_nicole
    id: Movimento_ocioso
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.tze200_3towulqd_ts0601_ocupacao
    id: Movimento
  - trigger: state
    to: 'off'
    entity_id: binary_sensor.tze200_3towulqd_ts0601_ocupacao
    id: Liberado
  conditions:
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: disarmed
  actions:
    - if:
      - condition: trigger
        id: Movimento
      then:
        - action: timer.start
          target:
            entity_id: timer.quarto_nicole
          data: {}
        - if:
          - condition: state
            entity_id: switch.sonoff_10018dee48_3
            state: 'off'
          then:
            - action: switch.turn_on
              target:
                entity_id: switch.sonoff_10026c409b_1
              data: {}
            - type: turn_on
              device_id: 5bd4ebd22dcd5e84cf3e8570dbcc12f7
              entity_id: 7fdd514f2abd8ee085763019ba618a6a
              brightness_pct: 100
              domain: light
    - if:
      - condition: trigger
        id: Movimento_ocioso
      then:
        - action: switch.turn_off
          target:
            entity_id: switch.sonoff_10026c409b_2
          data: {}
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - action: switch.turn_off
          target:
            entity_id: switch.sonoff_10026c409b_1
          data: {}
        - delay:
            hours: 0
            minutes: 1
            seconds: 0
            milliseconds: 0
        - type: turn_off
          device_id: afab14d6c5d511f765acf8ab4d133ef0
          domain: media_player
        - action: switch.turn_off
          target:
            entity_id:
              - switch.luzes_da_nicole
              - switch.espelho_banheiro_nicole_interruptor_1
          data: {}
        - type: turn_off
          device_id: 5bd4ebd22dcd5e84cf3e8570dbcc12f7
          entity_id: 7fdd514f2abd8ee085763019ba618a6a
          domain: light
    - if:
      - condition: trigger
        id: Liberado
      then:
        - action: timer.start
          target:
            entity_id: timer.quarto_nicole
          data: {}
