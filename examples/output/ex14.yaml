- id: '1780870759711'
  alias: Nicole - movimento
  description: ''
  mode: restart
  triggers:
  - trigger: state
    to: idle
    entity_id: timer.quarto_nicole
    id: Movimento_ocioso
  - trigger: state
    to: 'on'
    entity_id: binary_sensor.tze200_3towulqd_ts0601_ocupacao
    id: Movimento
  - trigger: state
    to: 'off'
    entity_id: binary_sensor.tze200_3towulqd_ts0601_ocupacao
    id: Liberado
  conditions:
  - condition: state
    entity_id: alarm_control_panel.alarmo
    state: disarmed
  actions:
    - if:
      - condition: trigger
        id: Movimento
      then:
        - type: start
          entity_id: timer.quarto_nicole
          domain: timer
        - if:
          - condition: state
            entity_id: switch.sonoff_10018dee48_3
            state: 'off'
          then:
            - type: turn_on
              entity_id: switch.sonoff_10026c409b_1
              type: turn_on
              device_id: 5bd4ebd22dcd5e84cf3e8570dbcc12f7
              entity_id: 7fdd514f2abd8ee085763019ba618a6a
              domain: light
              domain: switch
    - if:
      - condition: trigger
        id: Movimento_ocioso
      then:
        - type: turn_off
          entity_id: switch.sonoff_10026c409b_2
          domain: switch
        - delay:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
        - type: turn_off
          entity_id: switch.sonoff_10026c409b_1
          domain: switch
        - delay:
          hours: 0
          minutes: 1
          seconds: 0
          milliseconds: 0
        - type: turn_off
          device_id: afab14d6c5d511f765acf8ab4d133ef0
          domain: media_player
        - type: turn_off
          entity_id:
            - switch.luzes_da_nicole
            - switch.espelho_banheiro_nicole_interruptor_1
          domain: switch
        - type: turn_off
          device_id: 5bd4ebd22dcd5e84cf3e8570dbcc12f7
          entity_id: 7fdd514f2abd8ee085763019ba618a6a
          domain: light
    - if:
      - condition: trigger
        id: Liberado
      then:
        - type: start
          entity_id: timer.quarto_nicole
          domain: timer
